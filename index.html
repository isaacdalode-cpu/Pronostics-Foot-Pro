<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetMaster AI Pro</title>
    <style>
        /* Styles de base inspirés de la photo 2 */
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        .container { 
            max-width: 600px; 
            margin: auto; 
            background-color: #1a1a1a; 
            min-height: 100vh; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5); 
        }

        /* --- HEADER --- */
        header { 
            text-align: center; 
            padding: 25px; 
            border-bottom: 2px solid #222; 
            background-color: #000;
        }
        h1 { 
            margin: 0; 
            font-size: 1.8em; 
            letter-spacing: 2px; 
            color: #ffffff; 
            font-weight: 800; 
        }

        /* --- ZONE DATE (Copie de la photo 2) --- */
        .date-container {
            display: flex;
            background-color: #2a2a2a;
            border-bottom: 2px solid #222;
        }
        .date-btn {
            flex: 1;
            text-align: center;
            padding: 15px 5px;
            color: #b0b0b0;
            font-size: 0.9em;
            text-decoration: none;
            transition: 0.3s;
        }
        .date-btn.active {
            background-color: #ffd700; /* Le Jaune d'Or */
            color: #000;
            font-weight: bold;
        }
        .date-btn:hover:not(.active) {
            background-color: #333;
        }

        /* --- MENU ONGLETS PRONOS (Copie de la photo 2) --- */
        .nav-tabs { 
            display: flex; 
            background-color: #222; 
            border-bottom: 1px solid #333;
        }
        .tab-btn { 
            flex: 1; 
            text-align: center; 
            padding: 15px; 
            background: none; 
            border: none; 
            color: #b0b0b0; 
            cursor: pointer; 
            font-size: 0.95em; 
            font-weight: bold;
            transition: 0.3s;
        }
        .tab-btn.active { 
            background-color: #ffd700; 
            color: #000; 
        }

        /* --- VOTRE TABLEAU BETMASTER --- */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background-color: #1a1a1a;
            margin-top: 10px;
        }
        th { 
            background: #2a2a2a; 
            color: #fff; 
            padding: 15px; 
            border-bottom: 1px solid #333; 
            text-align: left; 
            font-size: 0.9em;
        }
        td { 
            padding: 15px; 
            border-bottom: 1px solid #2a2a2a; 
            color: #ddd; 
            vertical-align: top;
            font-size: 0.9em;
        }
        
        /* Personnalisation des colonnes */
        .match-col { font-weight: bold; color: #fff; line-height: 1.4; }
        .prono-col { color: #ccc; }
        .conf-col { 
            color: #00d4ff; /* Votre bleu d'origine */
            font-weight: bold; 
            text-align: center; 
        }
    </style>
</head>
<body>

<div class="container">
    <header><h1>BETMASTER AI</h1></header>

    <div class="date-container">
        <a href="#" class="date-btn">« Samedi</a>
        <a href="#" class="date-btn active">Dimanche<br>31/05/2026</a>
        <a href="#" class="date-btn">Lundi »</a>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active">1X2</button>
        <button class="tab-btn">Score</button>
        <button class="tab-btn">Buts</button>
        <button class="tab-btn">Premium</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Match</th>
                <th>Pronostic</th>
                <th>Confiance</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="match-col">Burgos CF vs<br>FC Andorra</td>
                <td class="prono-col">2nd Half</td>
                <td class="conf-col">64%</td>
            </tr>
            <tr>
                <td class="match-col">CD Leganes vs<br>CD Mirandes</td>
                <td class="prono-col">Plus de 1,5 buts</td>
                <td class="conf-col">65%</td>
            </tr>
            <tr>
                <td class="match-col">CD Leganes vs<br>CD Mirandes</td>
                <td class="prono-col">Score exact 1-1</td>
                <td class="conf-col">65%</td>
            </tr>
            <tr>
                <td class="match-col">Vllaznia Shkoder vs<br>AF Elbasani</td>
                <td class="prono-col">PLUS DE 1,5 BUTS</td>
                <td class="conf-col">72%</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
