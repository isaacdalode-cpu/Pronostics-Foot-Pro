<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronostics Foot Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f4f4; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; min-height: 100vh; }
        
        /* Header */
        header { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Date & Nav */
        .date-bar { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd; background: #fff; font-weight: bold; }
        .nav-tabs { display: flex; overflow-x: auto; background: #fff; border-bottom: 1px solid #ddd; }
        .tab { padding: 15px; cursor: pointer; white-space: nowrap; font-size: 0.9em; flex: 1; text-align: center; }
        .tab.active { border-bottom: 3px solid #3498db; color: #3498db; font-weight: bold; }

        /* Telegram Box */
        .telegram { background: #e8f4fd; padding: 20px; text-align: center; margin: 10px; border-radius: 8px; }
        .btn { background: #3498db; color: white; padding: 12px 25px; border: none; border-radius: 5px; display: inline-block; margin-top: 10px; text-decoration: none; font-weight: bold; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; color: #555; }
        .match-name { text-align: left; font-size: 0.9em; }
        .pred { font-weight: bold; color: #2c3e50; background: #eee; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <header><strong>MYBETS TODAY</strong> <span>☰</span></header>
    
    <div class="date-bar"><span>&lt;</span> 30 Mai <span>&gt;</span></div>
    
    <div class="nav-tabs">
        <div class="tab active" onclick="filtrerOnglet('1X2')">Predictions 1X2</div>
        <div class="tab" onclick="filtrerOnglet('OVER')">Under/Over 2.5</div>
        <div class="tab" onclick="filtrerOnglet('BTTS')">BTTS</div>
    </div>

    <div class="telegram">
        <p>Rejoignez notre groupe Telegram pour plus de pronostics.</p>
        <a href="https://t.me/votre_lien" class="btn">Rejoindre le Groupe</a>
    </div>

    <table>
        <thead>
            <tr><th>Heure</th><th>Match</th><th>Pronostic</th></tr>
        </thead>
        <tbody id="match-body">
            <!-- Les matchs seront insérés ici par JavaScript -->
        </tbody>
    </table>
</div>

<script>
    // Base de données des matchs classés par onglet
    const donneesMatchs = {
        "1X2": [
            { heure: "19:30", match: "Gimnasia vs Belgrano", pred: "2" },
            { heure: "22:00", match: "Instituto vs Lanus", pred: "1" }
        ],
        "OVER": [
            { heure: "19:30", match: "Gimnasia vs Belgrano", pred: "Over 2.5" },
            { heure: "22:00", match: "Instituto vs Lanus", pred: "Under 2.5" }
        ],
        "BTTS": [
            { heure: "19:30", match: "Gimnasia vs Belgrano", pred: "Oui" },
            { heure: "22:00", match: "Instituto vs Lanus", pred: "Non" }
        ]
    };

    function filtrerOnglet(categorie) {
        // Mettre à jour l'onglet actif
        const onglets = document.querySelectorAll('.tab');
        onglets.forEach(tab => tab.classList.remove('active'));
        event.currentTarget.classList.add('active');

        // Afficher les matchs correspondants
        const corpsTableau = document.getElementById('match-body');
        corpsTableau.innerHTML = ""; // Vider le tableau
        
        const matchsDuJour = donneesMatchs[categorie] || [];
        matchsDuJour.forEach(m => {
            corpsTableau.innerHTML += `
                <tr>
                    <td>${m.heure}</td>
                    <td class="match-name">${m.match}</td>
                    <td><span class="pred">${m.pred}</span></td>
                </tr>`;
        });
    }

    // Charger les prédictions 1X2 par défaut au démarrage
    filtrerOnglet('1X2');
</script>

</body>
</html>
