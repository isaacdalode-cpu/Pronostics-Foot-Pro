<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetMaster Pronostics</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        h1 { text-align: center; color: #fff; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #222; color: #fff; padding: 12px; border: 1px solid #444; text-align: left; }
        td { padding: 12px; border: 1px solid #333; color: #ddd; }
        
        .match-col { font-weight: bold; color: #fff; }
        .prob-col { color: #00d4ff; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>BETMASTER AI</h1>

    <table>
        <thead>
            <tr>
                <th>Match</th>
                <th>Pronostic</th>
                <th>Confiance</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="match-col">Burgos CF vs FC Andorra</td>
                <td>2nd Half</td>
                <td class="prob-col">64%</td>
            </tr>
            <tr>
                <td class="match-col">CD Leganes vs CD Mirandes</td>
                <td>Plus de 1,5 buts</td>
                <td class="prob-col">65%</td>
            </tr>
            <tr>
                <td class="match-col">CD Leganes vs CD Mirandes</td>
                <td>Score exact 1-1</td>
                <td class="prob-col">65%</td>
            </tr>
            <tr>
                <td class="match-col">Vllaznia Shkoder vs AF Elbasani</td>
                <td>PLUS DE 1,5 BUTS</td>
                <td class="prob-col">72%</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
