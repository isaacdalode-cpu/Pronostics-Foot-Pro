<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BetMaster AI</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; margin: 0; }
        .container { max-width: 600px; margin: auto; background-color: #1a1a1a; min-height: 100vh; }
        header { text-align: center; padding: 20px; background-color: #000; font-size: 1.5em; font-weight: bold; }
        
        .date-bar { display: flex; background: #222; }
        .date-btn { flex: 1; padding: 15px; text-align: center; color: #aaa; border: none; background: none; }
        .date-btn.active { background: #ffd700; color: #000; font-weight: bold; }

        .nav-tabs { display: flex; background: #222; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; color: #fff; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-bottom: 3px solid #ffd700; background: #333; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { padding: 15px; text-align: left; color: #aaa; font-size: 0.9em; }
        td { padding: 15px; border-bottom: 1px solid #333; }
        .conf-col { color: #00d4ff; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>BETMASTER AI</header>
    
    <div class="date-bar">
        <div class="date-btn">« Samedi</div>
        <div class="date-btn active">Dimanche<br>31/05/2026</div>
        <div class="date-btn">Lundi »</div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="show('1X2', this)">1X2</button>
        <button class="tab-btn" onclick="show('Score', this)">Score</button>
        <button class="tab-btn" onclick="show('Buts', this)">Buts</button>
        <button class="tab-btn" onclick="show('Premium', this)">Premium</button>
    </div>

    <table>
        <thead><tr><th>Match</th><th>Pronostic</th><th>Confiance</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // TES DONNÉES : Change le contenu ici quand tu veux
    const db = {
        '1X2': [
            {m: "Burgos CF vs FC Andorra", p: "2nd Half", c: "64%"},
            {m: "CD Leganes vs CD Mirandes", p: "Plus de 1,5 buts", c: "65%"}
        ],
        'Score': [
            {m: "CD Leganes vs CD Mirandes", p: "Score exact 1-1", c: "65%"}
        ],
        'Buts': [
            {m: "Vllaznia Shkoder vs AF Elbasani", p: "PLUS DE 1,5 BUTS", c: "72%"}
        ],
        'Premium': [
            {m: "Match Premium", p: "Analyse Pro", c: "90%"}
        ]
    };

    function show(type, btn) {
        // Gérer le style des boutons
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Remplir le tableau
        const body = document.getElementById('tableBody');
        body.innerHTML = "";
        db[type].forEach(item => {
            body.innerHTML += `<tr><td>${item.m}</td><td>${item.p}</td><td class="conf-col">${item.c}</td></tr>`;
        });
    }

    // Chargement initial
    show('1X2', document.querySelector('.tab-btn'));
</script>
</body>
</html>
